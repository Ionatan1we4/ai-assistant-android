name: Generate Keystore and SHA-1

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore mykeystore.jks -alias mykey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android, O=Android, C=US" -storepass android -keypass android
      
      - name: Get SHA-1
        run: |
          keytool -list -v -keystore mykeystore.jks -storepass android 2>&1 | grep -A 1 "SHA1:" | head -2 | tail -1 | awk '{print $1}' > sha1.txt
          echo "SHA-1: $(cat sha1.txt)"
      
      - name: Convert to base64
        run: base64 mykeystore.jks > keystore_base64.txt
      
      - name: Upload SHA-1 and base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            sha1.txt
            keystore_base64.txt
