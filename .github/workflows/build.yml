name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract SHA-1 from Secret Keystore
        run: |
          # 1. Decodăm fișierul binar din Secret
          echo "${{ secrets.GROQ_API_KEY }}" | base64 --decode > my_keystore.p12

          # 2. Extragem SHA-1 folosind keytool (comanda robustă)
          # Folosim -v pentru detalii și căutăm linia cu SHA1
          keytool -list -v -keystore my_keystore.p12 -storepass android -alias android > cert_info.txt

          # 3. Parsăm rezultatul să luăm doar amprenta
          SHA1=$(grep "SHA1:" cert_info.txt | head -n 1 | awk '{print $2}')

          if [ -z "$SHA1" ]; then
            echo "EROARE: Nu s-a putut extrage SHA1. Conținut cert_info.txt:"
            cat cert_info.txt
            exit 1
          fi

          echo "$SHA1" > sha1.txt
          echo "========================================"
          echo "SHA-1 PENTRU FIREBASE: $SHA1"
          echo "========================================"

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-firebase
          path: sha1.txt

          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

