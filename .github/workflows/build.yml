name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Create local.properties
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      
      - name: Generate and save SHA-1
        run: |
          ./gradlew signingReport > signing_report.txt
          grep "SHA1" signing_report.txt | head -1 | awk '{print $2}' > sha1.txt

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-key
          path: sha1.txt
        
      
      
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
