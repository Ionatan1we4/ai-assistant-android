name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Test if GROQ_API_KEY is base64
        run: |
          echo "${{ secrets.GROQ_API_KEY }}" | base64 --decode > test.txt 2>&1 || echo "Nu e base64 valid"
          file test.txt
      
      - name: Decode keystore and get SHA-1
        run: |
          # Decodezi Base64 în fișier binar corect
          echo "${{ secrets.GROQ_API_KEY }}" | base64 --decode > keystore.p12

          # Extragi SHA-1
          SHA1=$(keytool -list -v -keystore keystore.p12 -storetype PKCS12 -storepass android -alias android | grep "SHA1:" | awk '{print $2}')

          # Salvezi în fișier pentru upload
          echo "$SHA1" > sha1.txt
      
      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-key
          path: sha1.txt
          retention-days: 7
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
