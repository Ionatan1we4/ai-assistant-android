name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Generate SHA-1
        id: sha1
        run: |
          # Rulează signingReport și salvează output-ul
          ./gradlew signingReport > signing_report.txt 2>&1 || true
          
          # Extrage SHA-1 pentru debug
          SHA1=$(grep -A 2 "Variant: debug" signing_report.txt | grep "SHA1:" | head -1 | awk '{print $2}')
          
          # Dacă nu găsește, încearcă direct din keytool
          if [ -z "$SHA1" ]; then
            SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" | awk '{print $2}')
          fi
          
          # Salvează SHA-1 în fișier și environment
          echo "$SHA1" > sha1.txt
          echo "SHA1=$SHA1" >> $GITHUB_ENV
          
          # Afișează în log
          echo "======================================"
          echo "SHA-1 FINGERPRINT: $SHA1"
          echo "======================================"

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-key
          path: sha1.txt
          retention-days: 7
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
