name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract SHA-1 for Firebase
        run: |
          # Generăm raportul care conține cheile de semnare
          ./gradlew signingReport > signing_report.txt
          
          # Căutăm secțiunea Variant: debug și luăm prima linie cu SHA1 de după ea
          SHA1=$(grep -A 15 "Variant: debug" signing_report.txt | grep "SHA1" | head -n 1 | cut -d' ' -f2)
          
          # Scriem în fișier și afișăm în consolă pentru verificare rapidă
          echo "$SHA1" > sha1.txt
          echo "SHA-1 extras: $SHA1"

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-firebase-key
          path: sha1.txt
          retention-days: 7
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
