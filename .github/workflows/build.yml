name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract SHA-1 for Firebase
        run: |
          # Rulăm raportul de semnare și îl salvăm într-un fișier
          ./gradlew signingReport > report.txt
          
          # Extragem SHA1 folosind un regex mai sigur care ignoră culorile/spațiile
          # Căutăm prima apariție a SHA1 care are formatul de amprentă (perechi de hex)
          SHA1=$(grep -oE 'SHA1: [0-9A-F:]+' report.txt | head -n 1 | cut -d' ' -f2)
          
          # Dacă variabila e goală, afișăm tot raportul pentru depanare manuală
          if [ -z "$SHA1" ]; then
            echo "EROARE: Nu s-a găsit SHA1 în raport. Vezi output-ul de mai jos:"
            cat report.txt
            exit 1
          fi

          echo "$SHA1" > sha1.txt
          
          # AFIȘARE ÎN CONSOLĂ (O poți copia direct din Log-ul GitHub)
          echo "========================================"
          echo "COPIAZĂ ACEST COD ÎN FIREBASE:"
          echo "$SHA1"
          echo "========================================"

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-firebase
          path: sha1.txt
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

