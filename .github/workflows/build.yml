name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
     
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "YOUTUBE_API_KEY=\"dummy\"" >> local.properties
          echo "GROQ_API_KEY=\"dummy\"" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract SHA-1 (Universal Mode)
        run: |
          # 1. Decodare Secret
          echo "${{ secrets.GROQ_API_KEY }}" | base64 --decode > my_keystore.p12

          # 2. Listare fără alias (ca să vedem ce e înăuntru)
          # Folosim -v pentru detalii și -storepass pentru acces
          keytool -list -v -keystore my_keystore.p12 -storepass android > cert_info.txt 2>&1

          # 3. Extragere SHA-1 (căutăm linia care conține SHA1 și luăm doar codul hex)
          # Folosim tr pentru a curăța spațiile goale
          SHA1=$(grep "SHA1:" cert_info.txt | head -n 1 | cut -d':' -f2- | tr -d '[:space:]')

          # 4. Verificare dacă am găsit ceva
          if [ -z "$SHA1" ]; then
            echo "EROARE: Nu s-a găsit SHA-1. Conținutul raportului este:"
            cat cert_info.txt
            exit 1
          fi

          # 5. Salvare și afișare
          echo "$SHA1" > sha1.txt
          echo "========================================"
          echo "SHA-1 PENTRU FIREBASE: $SHA1"
          echo "========================================"

      - name: Upload SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: sha1-firebase
          path: sha1.txt


          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

